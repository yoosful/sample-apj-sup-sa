apiVersion: v1
kind: Namespace
metadata:
  name: ml-training
  labels:
    app.kubernetes.io/part-of: fine-tuning-on-eks
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-data-efs
  namespace: ml-training
  labels:
    app: qwen-ep-benchmark
    storage: efs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 500Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-ep-benchmark
  namespace: ml-training
  labels:
    app: qwen-ep-benchmark
    workload: gpu-training
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: qwen-ep-benchmark
        workload: gpu-training
    spec:
      restartPolicy: Never
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        karpenter.sh/capacity-type: on-demand
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values: ["g6e.12xlarge"]
      containers:
        - name: trainer
          image: modelscope-registry.us-west-1.cr.aliyuncs.com/modelscope-repo/modelscope:ubuntu22.04-cuda12.9.1-py312-torch2.10.0-vllm0.19.1-modelscope1.35.4-swift4.1.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail

              export CUDA_DEVICE_MAX_CONNECTIONS=1
              export NCCL_DEBUG="${NCCL_DEBUG:-WARN}"
              export HF_HOME=/data/huggingface
              export TRANSFORMERS_CACHE=/data/huggingface/hub
              export MODELSCOPE_CACHE=/data/modelscope
              export MODELSCOPE_DOMAIN=www.modelscope.ai
              export MASTER_ADDR=127.0.0.1
              export MASTER_PORT="${MASTER_PORT:-29500}"

              export RUN_ID="$(date -u +%Y%m%d-%H%M%S)-g6e12-ep4-swift413-unfused"
              export RUN_ROOT="/data/qwen-ep-bench/${RUN_ID}"
              export DATASET_PATH="${RUN_ROOT}/synthetic-chat.jsonl"
              export OUTPUT_DIR="${RUN_ROOT}/output-Qwen3.6-mb${QWEN_MICRO_BATCH_SIZE}-gb${QWEN_GLOBAL_BATCH_SIZE}-l${QWEN_MAX_LENGTH}-unfused"

              mkdir -p "${RUN_ROOT}" "${OUTPUT_DIR}"

              python3 - <<'PY'
              import json
              import os

              samples = int(os.environ.get("QWEN_MAX_SAMPLES", "256"))
              path = os.environ["DATASET_PATH"]

              with open(path, "w", encoding="utf-8") as f:
                  for idx in range(samples):
                      record = {
                          "messages": [
                              {
                                  "role": "user",
                                  "content": f"Write a concise troubleshooting note for distributed fine-tuning case {idx}.",
                              },
                              {
                                  "role": "assistant",
                                  "content": (
                                      "Check scheduling, model cache, attention backend, and GPU memory. "
                                      "Record the exact command, instance type, throughput, and final loss."
                                  ),
                              },
                          ]
                      }
                      f.write(json.dumps(record, ensure_ascii=False) + "\n")

              print(f"Wrote {samples} samples to {path}")
              PY

              SECONDS=0
              NPROC_PER_NODE="${QWEN_NPROC_PER_NODE}" \
              megatron sft \
                --model "${QWEN_MODEL}" \
                --use_hf true \
                --dataset "${DATASET_PATH}" \
                --tuner_type lora \
                --lora_rank 8 \
                --lora_alpha 32 \
                --target_modules all-linear \
                --tensor_model_parallel_size 1 \
                --pipeline_model_parallel_size 1 \
                --expert_model_parallel_size 4 \
                --moe_grouped_gemm true \
                --moe_permute_fusion true \
                --moe_shared_expert_overlap true \
                --moe_aux_loss_coeff 0.01 \
                --micro_batch_size "${QWEN_MICRO_BATCH_SIZE}" \
                --global_batch_size "${QWEN_GLOBAL_BATCH_SIZE}" \
                --max_length "${QWEN_MAX_LENGTH}" \
                --train_iters "${QWEN_TRAIN_ITERS}" \
                --finetune true \
                --bf16 true \
                --recompute_granularity full \
                --recompute_method uniform \
                --recompute_num_layers 1 \
                --attention_backend unfused \
                --padding_free false \
                --cross_entropy_loss_fusion true \
                --lr 1e-4 \
                --lr_warmup_iters 0 \
                --min_lr 0 \
                --logging_steps 1 \
                --save_steps "${QWEN_TRAIN_ITERS}" \
                --output_dir "${OUTPUT_DIR}" \
                --no_save_optim true \
                --no_save_rng true \
                --dataset_num_proc 8 \
                --report_to tensorboard

              duration="${SECONDS}"
              echo "BENCH_SECONDS=${duration}"
              echo "BENCH_SUCCESS model=${QWEN_MODEL} cfg=${QWEN_MICRO_BATCH_SIZE} ${QWEN_GLOBAL_BATCH_SIZE} ${QWEN_MAX_LENGTH} run_root=${RUN_ROOT}"
          env:
            - name: QWEN_MODEL
              value: "Qwen/Qwen3.6-35B-A3B"
            - name: QWEN_NPROC_PER_NODE
              value: "4"
            - name: QWEN_MICRO_BATCH_SIZE
              value: "4"
            - name: QWEN_GLOBAL_BATCH_SIZE
              value: "16"
            - name: QWEN_MAX_LENGTH
              value: "2048"
            - name: QWEN_MAX_SAMPLES
              value: "256"
            - name: QWEN_TRAIN_ITERS
              value: "16"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "44"
              memory: "360Gi"
              nvidia.com/gpu: "4"
            limits:
              cpu: "48"
              memory: "384Gi"
              nvidia.com/gpu: "4"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ml-data-efs
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "128Gi"
