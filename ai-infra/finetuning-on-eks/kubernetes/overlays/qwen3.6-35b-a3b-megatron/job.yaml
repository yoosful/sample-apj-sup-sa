apiVersion: v1
kind: Namespace
metadata:
  name: ml-training
  labels:
    app.kubernetes.io/part-of: fine-tuning-on-eks
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-data-efs
  namespace: ml-training
  labels:
    app: qwen-ep-benchmark
    storage: efs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 500Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-ep-benchmark
  namespace: ml-training
  labels:
    app: qwen-ep-benchmark
    workload: gpu-training
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: qwen-ep-benchmark
        workload: gpu-training
    spec:
      restartPolicy: Never
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        karpenter.sh/capacity-type: on-demand
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values: ["g6e.12xlarge"]
      containers:
        - name: trainer
          image: modelscope-registry.us-west-1.cr.aliyuncs.com/modelscope-repo/modelscope:ubuntu22.04-cuda12.9.1-py312-torch2.10.0-vllm0.19.1-modelscope1.35.4-swift4.1.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail

              export CUDA_DEVICE_MAX_CONNECTIONS=1
              export NCCL_DEBUG="${NCCL_DEBUG:-WARN}"
              export HF_HOME=/data/huggingface
              export TRANSFORMERS_CACHE=/data/huggingface/hub
              export MODELSCOPE_CACHE=/data/modelscope
              export MODELSCOPE_DOMAIN=www.modelscope.ai
              export PYTORCH_CUDA_ALLOC_CONF="${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"
              export MASTER_ADDR=127.0.0.1
              export MASTER_PORT="${MASTER_PORT:-29500}"

              export RUN_ID="$(date -u +%Y%m%d-%H%M%S)-g6e12-ep4-swift413-textmix"
              export RUN_ROOT="/data/qwen-ep-bench/${RUN_ID}"
              export EVAL_DIR="${RUN_ROOT}/eval"
              export DATASET_LIST_PATH="${RUN_ROOT}/datasets.txt"
              export EVAL_DATASET_LIST_PATH="${EVAL_DIR}/eval-datasets.txt"
              export OUTPUT_DIR="${RUN_ROOT}/output-Qwen3.6-mb${QWEN_MICRO_BATCH_SIZE}-gb${QWEN_GLOBAL_BATCH_SIZE}-l${QWEN_MAX_LENGTH}-textmix"
              export METRICS_DIR="${RUN_ROOT}/metrics"
              export TRAINING_LOG="${RUN_ROOT}/training.log"
              export EVAL_BASE_PATH="${EVAL_DIR}/base-generations.jsonl"
              export EVAL_FINETUNED_PATH="${EVAL_DIR}/finetuned-generations.jsonl"
              export EVAL_COMPARE_JSON="${EVAL_DIR}/sample-compare.json"
              export EVAL_COMPARE_MD="${EVAL_DIR}/sample-compare.md"

              mkdir -p "${RUN_ROOT}" "${OUTPUT_DIR}" "${EVAL_DIR}" "${METRICS_DIR}"

              IFS='|' read -r -a QWEN_DATASET_ARGS <<< "${QWEN_DATASETS}"
              IFS='|' read -r -a QWEN_EVAL_DATASET_ARGS <<< "${QWEN_EVAL_DATASETS}"

              if [ "${#QWEN_DATASET_ARGS[@]}" -eq 0 ] || [ -z "${QWEN_DATASET_ARGS[0]}" ]; then
                echo "QWEN_DATASETS must contain at least one SWIFT dataset registry entry"
                exit 1
              fi

              if [ "${#QWEN_EVAL_DATASET_ARGS[@]}" -eq 0 ] || [ -z "${QWEN_EVAL_DATASET_ARGS[0]}" ]; then
                echo "QWEN_EVAL_DATASETS must contain at least one SWIFT dataset registry entry"
                exit 1
              fi

              printf "%s\n" "${QWEN_DATASET_ARGS[@]}" | tee "${DATASET_LIST_PATH}"
              printf "%s\n" "${QWEN_EVAL_DATASET_ARGS[@]}" | tee "${EVAL_DATASET_LIST_PATH}"
              echo "BENCH_DATASETS=${QWEN_DATASETS}"
              echo "BENCH_EVAL_DATASETS=${QWEN_EVAL_DATASETS}"

              SECONDS=0
              NPROC_PER_NODE="${QWEN_NPROC_PER_NODE}" \
              megatron sft \
                --model "${QWEN_MODEL}" \
                --dataset "${QWEN_DATASET_ARGS[@]}" \
                --load_from_cache_file true \
                --add_non_thinking_prefix true \
                --loss_scale ignore_empty_think \
                --split_dataset_ratio "${QWEN_SPLIT_DATASET_RATIO}" \
                --tuner_type lora \
                --lora_rank 8 \
                --lora_alpha 32 \
                --target_modules all-linear \
                --tensor_model_parallel_size 1 \
                --pipeline_model_parallel_size 1 \
                --expert_model_parallel_size 4 \
                --moe_grouped_gemm true \
                --moe_permute_fusion true \
                --moe_shared_expert_overlap true \
                --moe_aux_loss_coeff 1e-6 \
                --micro_batch_size "${QWEN_MICRO_BATCH_SIZE}" \
                --global_batch_size "${QWEN_GLOBAL_BATCH_SIZE}" \
                --max_length "${QWEN_MAX_LENGTH}" \
                --train_iters "${QWEN_TRAIN_ITERS}" \
                --group_by_length true \
                --finetune true \
                --bf16 true \
                --recompute_granularity full \
                --recompute_method uniform \
                --recompute_num_layers 1 \
                --attention_backend unfused \
                --padding_free false \
                --cross_entropy_loss_fusion true \
                --lr 1e-4 \
                --lr_warmup_iters 0 \
                --min_lr 0 \
                --logging_steps 1 \
                --save_safetensors true \
                --merge_lora true \
                --save_steps "${QWEN_TRAIN_ITERS}" \
                --output_dir "${OUTPUT_DIR}" \
                --no_save_optim true \
                --no_save_rng true \
                --dataset_num_proc 8 \
                --dataloader_num_workers 8 \
                --report_to tensorboard 2>&1 | tee "${TRAINING_LOG}"

              python3 - <<'PY' || echo "BENCH_METRICS_WARN=loss_artifact_generation_failed"
              import ast
              import csv
              import json
              import math
              import os
              import re
              from pathlib import Path

              output_dir = Path(os.environ["OUTPUT_DIR"])
              metrics_dir = Path(os.environ["METRICS_DIR"])
              training_log = Path(os.environ["TRAINING_LOG"])
              csv_path = metrics_dir / "loss.csv"
              svg_path = metrics_dir / "loss.svg"
              summary_path = metrics_dir / "summary.txt"

              points = []

              def add_point(step, loss, source):
                  try:
                      step = int(float(step))
                      loss = float(loss)
                  except (TypeError, ValueError):
                      return
                  if not math.isfinite(loss):
                      return
                  points.append((step, loss, source))

              def extract_json_value(record, source):
                  if not isinstance(record, dict):
                      return
                  loss = record.get("loss")
                  if loss is None:
                      loss = record.get("train_loss")
                  step = (
                      record.get("step")
                      or record.get("global_step")
                      or record.get("iteration")
                      or record.get("iter")
                  )
                  if isinstance(step, str) and "/" in step:
                      step = step.split("/", 1)[0]
                  add_point(step, loss, source)

              if training_log.exists():
                  for line in training_log.read_text(encoding="utf-8", errors="replace").splitlines():
                      if "loss" not in line or "{" not in line or "}" not in line:
                          continue
                      match = re.search(r"\{.*\}", line)
                      if not match:
                          continue
                      try:
                          record = ast.literal_eval(match.group(0))
                      except Exception:
                          continue
                      extract_json_value(record, training_log.name)

              for path in output_dir.rglob("trainer_state.json"):
                  try:
                      state = json.loads(path.read_text(encoding="utf-8"))
                  except Exception:
                      continue
                  for record in state.get("log_history", []):
                      extract_json_value(record, str(path.relative_to(output_dir)))

              for path in list(output_dir.rglob("*.jsonl")) + list(output_dir.rglob("*.json")):
                  if path.name == "trainer_state.json":
                      continue
                  try:
                      text = path.read_text(encoding="utf-8")
                  except Exception:
                      continue
                  for line in text.splitlines():
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          record = json.loads(line)
                      except Exception:
                          continue
                      extract_json_value(record, str(path.relative_to(output_dir)))

              try:
                  from tensorboard.backend.event_processing import event_accumulator

                  for path in output_dir.rglob("events.out.tfevents.*"):
                      try:
                          accumulator = event_accumulator.EventAccumulator(
                              str(path), size_guidance={"scalars": 0}
                          )
                          accumulator.Reload()
                      except Exception:
                          continue
                      for tag in accumulator.Tags().get("scalars", []):
                          tag_name = tag.lower()
                          if tag_name not in ("loss", "train/loss"):
                              continue
                          try:
                              events = accumulator.Scalars(tag)
                          except Exception:
                              continue
                          for event in events:
                              add_point(event.step, event.value, f"{path.name}:{tag}")
              except Exception:
                  pass

              deduped = {}
              for step, loss, source in points:
                  deduped[step] = (loss, source)
              points = [(step, loss, source) for step, (loss, source) in sorted(deduped.items())]

              metrics_dir.mkdir(parents=True, exist_ok=True)
              with csv_path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.writer(f)
                  writer.writerow(["step", "loss", "source"])
                  writer.writerows(points)

              if points:
                  width, height = 900, 420
                  left, right, top, bottom = 72, 24, 36, 62
                  plot_w = width - left - right
                  plot_h = height - top - bottom
                  xs = [p[0] for p in points]
                  ys = [p[1] for p in points]
                  min_x, max_x = min(xs), max(xs)
                  min_y, max_y = min(ys), max(ys)
                  if min_x == max_x:
                      max_x = min_x + 1
                  if min_y == max_y:
                      pad = max(abs(min_y) * 0.05, 0.001)
                      min_y -= pad
                      max_y += pad
                  else:
                      pad = (max_y - min_y) * 0.08
                      min_y -= pad
                      max_y += pad

                  def sx(value):
                      return left + ((value - min_x) / (max_x - min_x)) * plot_w

                  def sy(value):
                      return top + ((max_y - value) / (max_y - min_y)) * plot_h

                  polyline = " ".join(f"{sx(step):.1f},{sy(loss):.1f}" for step, loss, _ in points)
                  grid_lines = []
                  labels = []
                  for i in range(5):
                      y = top + (plot_h * i / 4)
                      value = max_y - ((max_y - min_y) * i / 4)
                      grid_lines.append(
                          f'<line x1="{left}" y1="{y:.1f}" x2="{width-right}" y2="{y:.1f}" stroke="#e5e7eb" />'
                      )
                      labels.append(
                          f'<text x="{left-10}" y="{y+4:.1f}" text-anchor="end" font-size="12" fill="#4b5563">{value:.4g}</text>'
                      )
                  for i in range(5):
                      x = left + (plot_w * i / 4)
                      value = min_x + ((max_x - min_x) * i / 4)
                      labels.append(
                          f'<text x="{x:.1f}" y="{height-28}" text-anchor="middle" font-size="12" fill="#4b5563">{value:.0f}</text>'
                      )

                  svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">
                <rect width="100%" height="100%" fill="#ffffff"/>
                <text x="{left}" y="24" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#111827">Qwen Megatron-SWIFT MoE text-mix loss</text>
                <text x="{width-right}" y="24" font-size="13" font-family="Arial, sans-serif" text-anchor="end" fill="#4b5563">steps={len(points)} final_loss={points[-1][1]:.6g}</text>
                {''.join(grid_lines)}
                <line x1="{left}" y1="{top}" x2="{left}" y2="{height-bottom}" stroke="#111827" />
                <line x1="{left}" y1="{height-bottom}" x2="{width-right}" y2="{height-bottom}" stroke="#111827" />
                <polyline points="{polyline}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
                <circle cx="{sx(points[0][0]):.1f}" cy="{sy(points[0][1]):.1f}" r="4" fill="#10b981" />
                <circle cx="{sx(points[-1][0]):.1f}" cy="{sy(points[-1][1]):.1f}" r="4" fill="#ef4444" />
                {''.join(labels)}
                <text x="{width/2:.1f}" y="{height-8}" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#111827">training step</text>
                <text x="18" y="{top + plot_h/2:.1f}" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#111827" transform="rotate(-90 18 {top + plot_h/2:.1f})">loss</text>
              </svg>
              '''
                  svg_path.write_text(svg, encoding="utf-8")
              else:
                  svg_path.write_text(
                      '<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220"><rect width="100%" height="100%" fill="#ffffff"/><text x="32" y="60" font-size="18" font-family="Arial, sans-serif" fill="#111827">No step loss scalars were found.</text></svg>\n',
                      encoding="utf-8",
                  )

              summary = {
                  "points": len(points),
                  "first": {"step": points[0][0], "loss": points[0][1]} if points else None,
                  "final": {"step": points[-1][0], "loss": points[-1][1]} if points else None,
                  "csv": str(csv_path),
                  "svg": str(svg_path),
              }
              summary_path.write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")

              print(f"BENCH_LOSS_POINTS={len(points)}")
              if points:
                  print(f"BENCH_LOSS_FIRST={points[0][1]:.8g}@step{points[0][0]}")
                  print(f"BENCH_LOSS_FINAL={points[-1][1]:.8g}@step{points[-1][0]}")
              print(f"BENCH_LOSS_CSV={csv_path}")
              print(f"BENCH_LOSS_SVG={svg_path}")
              PY

              echo "BENCH_OUTPUT_DIR=${OUTPUT_DIR}"
              find "${OUTPUT_DIR}" -type d -name "checkpoint-${QWEN_TRAIN_ITERS}" | sort | tail -n 1 | sed 's#^#BENCH_CHECKPOINT_DIR=#'
              find "${OUTPUT_DIR}" -type d -name "checkpoint-${QWEN_TRAIN_ITERS}-merged" | sort | tail -n 1 | sed 's#^#BENCH_MERGED_MODEL_DIR=#'

              run_base_sample_inference() {
                rm -f "${EVAL_BASE_PATH}"
                CUDA_VISIBLE_DEVICES=0,1,2,3 \
                swift infer \
                  --model "${QWEN_MODEL}" \
                  --val_dataset "${QWEN_EVAL_DATASET_ARGS[@]}" \
                  --result_path "${EVAL_BASE_PATH}" \
                  --infer_backend vllm \
                  --vllm_tensor_parallel_size "${QWEN_NPROC_PER_NODE}" \
                  --vllm_enable_expert_parallel true \
                  --vllm_max_model_len "${QWEN_SAMPLE_MAX_MODEL_LEN}" \
                  --vllm_gpu_memory_utilization 0.85 \
                  --max_new_tokens "${QWEN_SAMPLE_MAX_NEW_TOKENS}" \
                  --enable_thinking false \
                  --temperature 0 \
                  --top_k 1 \
                  --stream false
              }

              run_finetuned_sample_inference() {
                local checkpoint_dir=""
                local merged_model_dir=""

                checkpoint_dir="$(find "${OUTPUT_DIR}" -type d -name "checkpoint-${QWEN_TRAIN_ITERS}" | sort | tail -n 1 || true)"
                merged_model_dir="$(find "${OUTPUT_DIR}" -type d -name "checkpoint-${QWEN_TRAIN_ITERS}-merged" | sort | tail -n 1 || true)"

                rm -f "${EVAL_FINETUNED_PATH}"
                if [ -n "${merged_model_dir}" ] && [ -d "${merged_model_dir}" ]; then
                  CUDA_VISIBLE_DEVICES=0,1,2,3 \
                  swift infer \
                    --model "${merged_model_dir}" \
                    --val_dataset "${QWEN_EVAL_DATASET_ARGS[@]}" \
                    --result_path "${EVAL_FINETUNED_PATH}" \
                    --infer_backend vllm \
                    --vllm_tensor_parallel_size "${QWEN_NPROC_PER_NODE}" \
                    --vllm_enable_expert_parallel true \
                    --vllm_max_model_len "${QWEN_SAMPLE_MAX_MODEL_LEN}" \
                    --vllm_gpu_memory_utilization 0.85 \
                    --max_new_tokens "${QWEN_SAMPLE_MAX_NEW_TOKENS}" \
                    --enable_thinking false \
                    --temperature 0 \
                    --top_k 1 \
                    --stream false
                elif [ -n "${checkpoint_dir}" ] && [ -d "${checkpoint_dir}" ]; then
                  CUDA_VISIBLE_DEVICES=0,1,2,3 \
                  swift infer \
                    --model "${QWEN_MODEL}" \
                    --adapters "${checkpoint_dir}" \
                    --val_dataset "${QWEN_EVAL_DATASET_ARGS[@]}" \
                    --result_path "${EVAL_FINETUNED_PATH}" \
                    --infer_backend vllm \
                    --vllm_tensor_parallel_size "${QWEN_NPROC_PER_NODE}" \
                    --vllm_enable_expert_parallel true \
                    --vllm_max_model_len "${QWEN_SAMPLE_MAX_MODEL_LEN}" \
                    --vllm_gpu_memory_utilization 0.85 \
                    --max_new_tokens "${QWEN_SAMPLE_MAX_NEW_TOKENS}" \
                    --enable_thinking false \
                    --temperature 0 \
                    --top_k 1 \
                    --stream false
                else
                  echo "BENCH_SAMPLE_WARN=checkpoint_not_found"
                  return 1
                fi
              }

              if [ "${QWEN_RUN_SAMPLE_INFERENCE}" = "true" ]; then
                if run_base_sample_inference; then
                  echo "BENCH_SAMPLE_BASE=${EVAL_BASE_PATH}"
                else
                  echo "BENCH_SAMPLE_WARN=base_inference_failed"
                fi

                if run_finetuned_sample_inference; then
                  echo "BENCH_SAMPLE_FINETUNED=${EVAL_FINETUNED_PATH}"
                else
                  echo "BENCH_SAMPLE_WARN=finetuned_inference_failed"
                fi

                python3 - <<'PY' || echo "BENCH_SAMPLE_WARN=sample_compare_generation_failed"
              if True:
                import json
                import os
                from pathlib import Path

                base_path = Path(os.environ["EVAL_BASE_PATH"])
                finetuned_path = Path(os.environ["EVAL_FINETUNED_PATH"])
                compare_json = Path(os.environ["EVAL_COMPARE_JSON"])
                compare_md = Path(os.environ["EVAL_COMPARE_MD"])
                eval_datasets = [
                    item
                    for item in os.environ.get("QWEN_EVAL_DATASETS", "").split("|")
                    if item
                ]

                def load_jsonl(path):
                    if not path.exists():
                        return []
                    rows = []
                    for line in path.read_text(encoding="utf-8", errors="replace").splitlines():
                        line = line.strip()
                        if not line:
                            continue
                        try:
                            rows.append(json.loads(line))
                        except Exception:
                            rows.append({"raw": line})
                    return rows

                def extract_prompt(record):
                    for key in ("query", "prompt", "input", "instruction", "question"):
                        value = record.get(key)
                        if isinstance(value, str) and value.strip():
                            return value.strip()
                    messages = record.get("messages")
                    if isinstance(messages, list):
                        for message in reversed(messages):
                            if message.get("role") == "user":
                                return str(message.get("content", "")).strip()
                    return ""

                def extract_response(record):
                    for key in (
                        "response",
                        "prediction",
                        "generated_text",
                        "generated_response",
                        "output",
                        "answer",
                        "content",
                        "text",
                    ):
                        value = record.get(key)
                        if isinstance(value, str) and value.strip():
                            return value.strip()
                    choices = record.get("choices")
                    if isinstance(choices, list) and choices:
                        choice = choices[0]
                        if isinstance(choice, dict):
                            message = choice.get("message")
                            if isinstance(message, dict) and message.get("content"):
                                return str(message["content"]).strip()
                            if choice.get("text"):
                                return str(choice["text"]).strip()
                    messages = record.get("messages")
                    if isinstance(messages, list):
                        for message in reversed(messages):
                            if message.get("role") == "assistant":
                                return str(message.get("content", "")).strip()
                    return json.dumps(record, ensure_ascii=False)[:2000]

                def looks_like_python(text):
                    stripped = text.strip()
                    if not stripped or "```" in stripped:
                        return False
                    markers = (
                        "def ",
                        "class ",
                        "import ",
                        "from ",
                        "if __name__",
                        "for ",
                        "while ",
                        "print(",
                        "input(",
                    )
                    code_lines = 0
                    for line in stripped.splitlines():
                        candidate = line.strip()
                        if not candidate:
                            continue
                        if candidate.startswith(markers) or candidate.endswith(":"):
                            code_lines += 1
                    return code_lines >= 2

                def format_response(text):
                    if not text:
                        return "_No output captured._"
                    stripped = text.strip()
                    if looks_like_python(stripped):
                        return f"```python\n{stripped}\n```"
                    return stripped

                base_rows = load_jsonl(base_path)
                finetuned_rows = load_jsonl(finetuned_path)

                records = []
                sample_count = max(len(base_rows), len(finetuned_rows))
                for idx in range(sample_count):
                    base_record = base_rows[idx] if idx < len(base_rows) else {}
                    finetuned_record = finetuned_rows[idx] if idx < len(finetuned_rows) else {}
                    records.append(
                        {
                            "prompt": extract_prompt(base_record) or extract_prompt(finetuned_record),
                            "base": extract_response(base_record),
                            "finetuned": extract_response(finetuned_record),
                        }
                    )

                compare_json.write_text(json.dumps(records, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

                lines = [
                    "# Qwen MoE Text-Mix Prompt Comparison",
                    "",
                    "Evaluation samples come from the SWIFT-supported text-only benchmark mix:",
                    "",
                ]
                for dataset in eval_datasets:
                    lines.append(f"- `{dataset}`")
                lines.append("")
                for idx, record in enumerate(records, 1):
                    lines.extend(
                        [
                            f"## Prompt {idx}",
                            "",
                            record["prompt"],
                            "",
                            "### Base",
                            "",
                            format_response(record["base"]),
                            "",
                            "### Fine-tuned",
                            "",
                            format_response(record["finetuned"]),
                            "",
                        ]
                    )
                compare_md.write_text("\n".join(lines), encoding="utf-8")

                print(f"BENCH_SAMPLE_PROMPTS={len(records)}")
                print(f"BENCH_SAMPLE_COMPARE_JSON={compare_json}")
                print(f"BENCH_SAMPLE_COMPARE_MD={compare_md}")
              PY
              else
                echo "BENCH_SAMPLE_SKIPPED=true"
              fi

              duration="${SECONDS}"
              echo "BENCH_SECONDS=${duration}"
              echo "BENCH_SUCCESS model=${QWEN_MODEL} cfg=${QWEN_MICRO_BATCH_SIZE} ${QWEN_GLOBAL_BATCH_SIZE} ${QWEN_MAX_LENGTH} run_root=${RUN_ROOT}"
          env:
            - name: QWEN_MODEL
              value: "Qwen/Qwen3.6-35B-A3B"
            - name: QWEN_NPROC_PER_NODE
              value: "4"
            - name: QWEN_MICRO_BATCH_SIZE
              value: "4"
            - name: QWEN_GLOBAL_BATCH_SIZE
              value: "16"
            - name: QWEN_MAX_LENGTH
              value: "2048"
            - name: QWEN_SAMPLE_MAX_MODEL_LEN
              value: "4096"
            - name: QWEN_SAMPLE_MAX_NEW_TOKENS
              value: "1024"
            - name: QWEN_DATASETS
              value: "hf::open-thoughts/OpenThoughts-114k#2048|hf::bespokelabs/Bespoke-Stratos-17k#1024|hf::TIGER-Lab/MATH-plus#1024|hf::allenai/tulu-v2-sft-mixture#1024"
            - name: QWEN_EVAL_DATASETS
              value: "hf::open-thoughts/OpenThoughts-114k#2|hf::TIGER-Lab/MATH-plus#1"
